<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" role="img" aria-label="Go Run Finance">
  <defs>
    <linearGradient id="grfBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7c5cff"/>
      <stop offset="55%" stop-color="#5b8cff"/>
      <stop offset="100%" stop-color="#22c55e"/>
    </linearGradient>
    <linearGradient id="grfStripe" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="1"/>
    </linearGradient>
  </defs>

  <rect width="64" height="64" rx="14" fill="url(#grfBg)"/>

  <!-- Subtle baseline -->
  <line x1="10" y1="50" x2="54" y2="50" stroke="#ffffff" stroke-opacity="0.18" stroke-width="2" stroke-linecap="round"/>

  <!-- Three ascending speed/growth stripes -->
  <g stroke="url(#grfStripe)" stroke-linecap="round" fill="none">
    <line x1="12" y1="46" x2="22" y2="36" stroke-width="5"/>
    <line x1="22" y1="46" x2="38" y2="30" stroke-width="5.5"/>
    <line x1="32" y1="46" x2="52" y2="26" stroke-width="6"/>
  </g>

  <!-- Target / "go" dot at the apex -->
  <circle cx="52" cy="22" r="4.5" fill="#ffffff"/>
  <circle cx="52" cy="22" r="2" fill="#22c55e"/>
</svg>
